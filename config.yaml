# Glencore Quant — central config

glencore:
  ticker: "GLEN.L"            # LSE, priced in pence (GBX)
  start_date: "2011-05-19"    # IPO date
  currency: "GBX"             # important — see gotcha below

commodities:
  copper: "HG=F"
  brent: "BZ=F"
  natgas: "NG=F"
  zinc: "ZNC=F"
  # nickel removed — NI=F delisted

macro:
  dxy: "DX-Y.NYB"             # US Dollar Index
  gbpusd: "GBPUSD=X"          # for currency conversion

paths:
  raw: "data/raw"
  interim: "data/interim"
  processed: "data/processed"